# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.
#"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 2, 4, 3 ]
sort_by        = "alphabetical"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
sort_translit  = false
linemode       = "none"
show_hidden    = true
show_symlink   = true
scrolloff      = 5
mouse_events   = [ "click", "scroll" ]
title_format   = "Yazi: {cwd}"

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1200
max_height      = 800
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75
sixel_fraction  = 15
ueberzug_scale  = 0.85
ueberzug_offset = [25, 1, -0.5, -0.5]

[opener]
edit = [
    { run = '${EDITOR:-nvim} "$@"', desc = "$EDITOR", block = true, for = "unix" },
]
open = [
    { run = 'xdg-open "$1"', desc = "Open", for = "linux" },
]
reveal = [
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal", for = "linux" },
]
extract = [
    { run = '7z x "$@"', desc = "Extract here", for = "unix" },
]
play = [
    { run = 'mpv --force-window "$@"', orphan = true, for = "unix" },
]

[open]
rules = [
    { name = "*/", use = ["open", "reveal"] },
    { mime = "text/*", use = ["preview", "edit", "reveal"] },
    { mime = "image/*", use = ["preview", "open", "reveal"] },
    { mime = "application/pdf", use = ["open", "reveal"] },
    { mime = "{audio,video}/*", use = ["play", "reveal"] },
    { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = ["extract", "reveal"] },
    { mime = "application/{json,ndjson}", use = ["preview", "edit", "reveal"] },
    { mime = "*/javascript", use = ["preview", "edit", "reveal"] },
    { mime = "inode/empty", use = ["edit", "reveal"] },
    { name = "*", use = ["open", "reveal"] },
]

[tasks]
micro_workers    = 10
macro_workers    = 10
bizarre_retry    = 3
image_alloc      = 536870912
image_bound      = [ 0, 0 ]
suppress_preload = false

[input]
cursor_blink = false

[confirm]
trash_title  = "Trash {n} selected file{s}?"
delete_title = "Permanently delete {n} selected file{s}?"
quit_title   = "Quit?"

[pick]
open_title = "Open with:"


