# A TOML linter such as https://taplo.tamasfe.dev/ can use this schema to validate your config.
# If you encounter any issues, please make an issue at https://github.com/yazi-rs/schemas.


# keymap.toml - Yazi key bindings

# Navigation
h = "cursor_left"
j = "cursor_down"
k = "cursor_up"
l = "cursor_right"
H = "scroll_left"
J = "scroll_down"
K = "scroll_up"
L = "scroll_right"
gg = "goto_top"
G = "goto_bottom"

# File operations
c = "create"
C = "create_dir"
r = "rename"
d = "trash"
D = "delete"
y = "copy"
p = "paste"
x = "cut"
o = "open"

# Filter/Search
"/" = "filter"
"?" = "reverse_filter"
n = "find_next"
N = "find_prev"
s = "shell"

# Media playback (mpv/Celluloid)
Space = "mpv_pause"
S = "mpv_stop"
"[" = "mpv_prev"
"]" = "mpv_next"

# Other
q = "quit"
